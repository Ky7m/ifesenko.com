name: Infra

on:
  workflow_dispatch:
    inputs:
      what-if:
        description: "Run a what-if preview instead of applying changes"
        type: boolean
        default: true

# Global concurrency key — all infra dispatches serialize against the same
# Azure target regardless of which branch triggered them.
concurrency:
  group: infra-ifesenko-swa
  cancel-in-progress: false

permissions:
  id-token: write
  contents: read

jobs:
  deploy:
    name: Deploy Bicep
    runs-on: ubuntu-latest
    environment: infra
    steps:
      - uses: actions/checkout@v6

      - name: OIDC Login via Azure CLI
        uses: azure/login@v3
        with:
          client-id: ${{ secrets.AZURE_CLIENT_ID }}
          tenant-id: ${{ secrets.AZURE_TENANT_ID }}
          subscription-id: ${{ secrets.AZURE_SUBSCRIPTION_ID }}

      - name: Validate (what-if)
        if: ${{ inputs.what-if }}
        run: |
          az deployment sub what-if \
            --name ifesenko-swa-${{ github.run_number }} \
            --location centralus \
            --template-file infra/main.bicep \
            --parameters infra/main.bicepparam

      - name: Deploy
        if: ${{ !inputs.what-if }}
        run: |
          az deployment sub create \
            --name ifesenko-swa-${{ github.run_number }} \
            --location centralus \
            --template-file infra/main.bicep \
            --parameters infra/main.bicepparam
