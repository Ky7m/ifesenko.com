name: Close PR Preview

on:
  pull_request:
    types: [closed]
    branches: [ "main" ]

# Shared concurrency group with ci-cd.yml — any in-flight upload for this PR
# is cancelled before we call `action: close`, preventing a stale preview env.
concurrency:
  group: swa-${{ github.event.pull_request.number }}
  cancel-in-progress: true

permissions:
  contents: read
  pull-requests: write

jobs:
  close:
    name: Tear down preview environment
    runs-on: ubuntu-latest
    if: github.event.pull_request.head.repo.full_name == github.repository
    steps:
      - name: Close preview environment
        uses: Azure/static-web-apps-deploy@v1
        with:
          azure_static_web_apps_api_token: ${{ secrets.AZURE_STATIC_WEB_APPS_API_TOKEN }}
          action: close
